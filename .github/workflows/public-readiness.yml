name: public-readiness

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install public-readiness tools and project dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml nbformat pytest ruff black bandit
          for file in requirements.txt requirements-dev.txt requirements_ci.txt; do
            if [ -f "$file" ]; then python -m pip install -r "$file"; fi
          done
          if [ -f setup.py ]; then python -m pip install -e .; fi
          if [ -f pyproject.toml ] && grep -q '^\[project\]' pyproject.toml; then python -m pip install -e .; fi
      - name: Technical public-readiness checks
        run: python tools/public_readiness_check.py
